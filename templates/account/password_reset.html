{% extends "base.html" %}
{% load allauth account %}
{% block title %}비밀번호 찾기 — LAI Service{% endblock %}
{% block content %}
<div style="max-width:400px; margin:2rem auto;">
  <h1 style="text-align:center; margin-bottom:0.25rem;">비밀번호 찾기</h1>
  <p class="muted" style="text-align:center; margin-bottom:1.5rem;">
    가입한 이메일로 재설정 링크를 보내드려요.
  </p>

  <div class="card">
    <form method="post" action="{% url 'account_reset_password' %}">
      {% csrf_token %}

      <div style="margin-bottom:1.25rem;">
        <label style="display:block; font-weight:500; margin-bottom:0.4rem;">이메일</label>
        <input type="email" name="email" autocomplete="email" autofocus required
               style="width:100%; padding:0.75rem; border:1px solid var(--border); border-radius:8px;
                      background:var(--bg); color:var(--fg); font-size:1rem;">
      </div>

      <button type="submit" class="btn" style="width:100%; font-size:1.05rem;">
        재설정 링크 받기
      </button>
    </form>

    <p style="text-align:center; margin-top:1rem;">
      <a href="{% url 'account_login' %}" class="muted" style="font-size:0.9rem;">‹ 로그인으로 돌아가기</a>
    </p>
  </div>
</div>
{% endblock %}
