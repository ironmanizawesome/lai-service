# LAIon
### 3D 재건 AI로 작물 LAI를 추정하는 웹 서비스

202117476 이규현 / 응용소프트웨어개발

> 스마트폰 하나로 작물을 파악하는

Note: 오늘은 "남의 논문 소개"가 아니라, 그 기술을 가져다 실제로 동작하는 서비스로 만든 이야기입니다. 원리 → 응용 → 서비스 순서로 갑니다.

---

## 한 장 요약

문제 — 잎이 얼마나 무성한지(LAI) 재려면 잎을 따거나 비싼 장비가 필요했음

아이디어 — 폰 영상 → AI가 3D로 재건 → 작물의 잎 양을 추정

만든 것 — 누구나 폰으로 찍어 올리면 결과를 받는 웹 서비스 (회원가입·업로드·결과·성장 추세까지)

오늘은 어떤 문제인지, 무엇으로 풀었는지, 어떻게 쓰게 했는지 순서로 보겠습니다

Note: 이 슬라이드가 전체 지도. 청중이 길을 잃으면 여기로 돌아온다.

---

## 그런데 LAI가 뭐길래?

LAI (엽면적지수) — 땅 면적당 잎이 얼마나 빽빽한지를 나타내는 숫자

- 작물의 광합성 능력·생육 상태를 보는 핵심 지표
- 높을수록 잎이 무성함

기존 측정 방식의 불편함
- 🌿 잎을 직접 따서 면적을 잼 → 작물을 망가뜨림
- 💸 LAI-2200 같은 전용 장비 → 비싸고 다루기 어려움
- 📋 결국 농가에서 자주 측정하기 어려움

> 그래서 목표는 "폰으로 찍으면 끝"

Note: 청중이 농업 비전공이어도 "잎이 빽빽한 정도"로만 이해하면 충분.

---

## 그런데, 작물 모니터링 기술은 이미 많지 않나?

가장 먼저 나올 질문 — "굳이 이걸 왜?"

| 기존 방식 | 무엇을 보나 | 한계 |
|---|---|---|
| 위성 원격탐사 | 식생지수(NDVI) | 해상도 낮음 · 구름 · 재방문 느림 |
| 드론 멀티스펙트럴 | 빛 반사(색) | 구조가 아닌 '색' → LAI 간접·포화 |
| LiDAR (지상/드론) | 3D 구조 | 정밀하지만 비싸고 무거움 |
| 광학 센서(LAI-2200) | 한 점의 투과율 | 노동집약 · 좁은 범위 |

→ 저비용과 3D 구조, 둘 다 잡은 방법은 아직 없음

Note: 기존 시스템을 인정하고 시작한다. 무시가 아니라 "여기가 비어있다"를 짚는 게 설득력.

---

## 비어 있던 자리: 저비용 × 3D 구조

단안 카메라(폰) 한 대 + AI 3D 재건 — 그 빈칸을 메움

- 📷 LiDAR 없이 일반 카메라만으로 3D 복원 → 장비비 거의 0
- 🌿 색(지수)이 아니라 잎의 3D 형태, 즉 부피와 피복을 직접 잼
- 📱 그리고 누구나 폰으로 쓰게 서비스로 — 저비용 도구는 '접근성'이 생명

> 비싼 LiDAR의 정밀함과 폰의 저비용, 그 사이를 메움<br>
> 명령어를 직접 쳐야 하는 도구가 아니라 '앱'으로 만든 이유 — 써야 의미가 있으니까

Note: "왜 단안 카메라?" = 저비용. "왜 앱?" = 저비용 도구는 접근성이 핵심. CLI(명령어로 돌리는 도구)는 개발자만 쓸 수 있다는 점을 한 마디로. 여기가 발표의 셀링포인트.

## 응용 ① map-LAIpot: 3D 점에서 잎 지표 뽑기

폰 영상 → AI(LingBot-Map)가 3D 점구름까지 생성. 거기서 잎 지표를 뽑아내는 단계를 직접 구현

```
3D 점 구름
   ① up_vector  — 어느 쪽이 '위'인지 추정 (중력 방향)
   ② pots       — 화분/베드를 각각 분리
   ③ lai        — 화분마다 두 갈래로 산출
```

두 갈래 하이브리드 (강점이 서로 다름):
- 피복률 (footprint) — 위에서 본 잎 실루엣 비율. 스케일에 강건한 직관적 기준
- 부피 × LAD — 외피 부피에 엽면적밀도(LAD)를 곱해 '숨은 잎'까지 추정 → LAI 환산

화분이 여러 개여도 각각 따로(per-pot), 온실 화분·베드를 옆에서 촬영하는 시나리오에 맞춤

Note: 핵심 정직성 — 우리가 직접 재는 건 '3D 형태'(부피·피복)다. LAI로 가려면 LAD(엽면적밀도=단위 부피당 잎 면적)를 곱해야 하는데, LAD는 작물·생육단계마다 다른 값이라 보정이 필요하다(다음 한계 슬라이드). 즉 'LAI를 직접 잰다'기보단 '형태를 재고 LAI를 추정한다'가 정확. LingBot-Map은 안 건드리고 출력만 활용 → 재사용성.

## 응용 ② 한 번이 아니라, 추세로

한 번 재고 끝이 아니라 — 여러 번 측정해 성장 흐름을 봄

- 측정할 때마다 결과를 기록 → 시계열 그래프
- 단순 회귀(polyfit)로 앞으로의 성장 예측 + 신뢰 구간
- 데이터가 적거나 들쭉날쭉하면 "추세 신뢰도 낮음" 표시 (과신 방지)

절대 수치를 누적·비교하는 구조라, 측정 이력만 쌓이면 그대로 동작 — 지금은 더미 데이터로 그래프 모습을 확인

> "지금 이만큼 자랐고, 이대로면 2주 뒤 이쯤 될 것"

Note: 단일 측정 도구가 아니라 '추적 서비스'라는 점이 차별점. 추세 그래프는 코드로 구현·동작은 끝났지만, 실제 측정 이력이 아직 안 쌓여 정확도 검증은 못 했다. 대신 더미 데이터를 넣어 그래프가 어떻게 보이는지 캡처로 보여준다.

## 기술 스택: 어떻게 서비스로 만들었나

웹은 무료 클라우드, 무거운 AI 계산은 로컬 GPU로 분리

```
 📱 사용자 폰
     │  업로드
     ▼
 ☁️ Render (웹 서버, 무료)  ──기록──▶  Neon(DB) · R2(파일 저장)
     │  작업 큐 (Upstash)
     ▼
 🖥️ 로컬 GPU 워커 (RTX 5080)  ──▶ LingBot-Map 추론 + LAI 계산 → 결과 업로드
```

- 웹 서버엔 GPU가 없어도 됨 → 무료 호스팅으로 운영
- GPU는 로컬 머신이 큐를 받아 처리 (바깥으로 나가는 연결만 → 보안 OK)
- Django + Celery 기반, 영상·결과는 클라우드(R2)에 보관

Note: 원래는 추론용 클라우드 GPU를 따로 빌리려 했지만, 비용을 아끼려고 '이미 가진 로컬 GPU'를 활용했다 — 저비용 컨셉과도 맞물린다. 단점도 솔직히 말할 것: 로컬 머신을 계속 켜둬야 하고(상시 가동), 전원·네트워크가 끊기면 멈춘다. 사용량이 늘면 이 워커 자리만 클라우드 GPU로 바꾸면 되고, 분리 배포 구조는 그대로다.

## 데이터 설계: 수업에서 배운 ORM 관계

사용자 → 작물 → 측정 → 결과 위계를 Django ORM으로 모델링

```
User
 └─1:N─ CropProject ─────N:N───── Tag
          ├─1:N─ Measurement ─1:1─ MeasurementResult ─1:N─ ResultComponent
          │                                  └─1:1─ Preview3D
          └─1:1─ TrendSnapshot
```

- 1:1 (OneToOneField) — 측정↔결과 · 결과↔3D미리보기 · 작물↔추세스냅샷
- 1:N (ForeignKey) — 사용자→작물 · 작물→측정 · 결과→화분(컴포넌트)
- N:N (ManyToManyField) — 작물 ↔ 태그 (한 작물에 여러 태그, 한 태그가 여러 작물을 묶음)

Note: 수업에서 배운 ORM 관계를 어디에 썼는지 보여주는 슬라이드. 1:1은 '반드시 하나만 대응'(측정 한 건의 결과는 하나), 1:N은 계층(작물 하나에 측정 여럿), N:N은 태그(작물과 태그가 서로 여러 개로 연결). 태그(Tag)는 다대다를 보여주려고 추가한 공유 라벨이다.

## 화분에서 끝나지 않는다 — 확장성

```
지금:  온실 화분·베드   (옆에서 폰 촬영, 수십 초)
   ▼
다음:  노지 작물        (드론에 단안 카메라 탑재)
   ▼
멀리:  옥수수밭 같은 넓은 면적을 한 번의 비행으로
```

- 왜 넓은 밭이 가능? — 멀리 이동하며 찍어도 누적 오차에 강해, 끝까지 형태가 무너지지 않음
- 단안 카메라라 드론에 가볍고 싸게 탑재 (LiDAR 드론보다 저렴)
- 같은 파이프라인, 입력 규모만 키우면 됨 (화분 분리 → 구획 분리로 일반화)

> 저비용 정밀 작물 모니터링을 소규모 온실부터 대규모 노지까지

Note: 확장성의 근거는 '누적 오차에 강하다'는 점. 길게 이동하며 찍어도 끝부분 형태가 잘 안 틀어져서 넓은 면적을 버틴다. (수업 성격상 모델 내부 원리는 생략)

## 솔직한 검증 상태 & 한계

되는 것
- 파이프라인 전 구간 동작 (업로드 → 3D → 화분별 지표 → 추세)
- 실제 배포돼 폰에서 사용 가능

아직 검증이 필요한 것
- LAD(엽면적밀도) 보정 — 부피→LAI 환산 계수가 작물·생육단계마다 다름. 현재는 문헌 기본값(placeholder) → 파괴측정으로 보정 필요
- 추세·예측 그래프 — 구현·동작은 완료, 실측 이력이 부족해 더미 데이터로 시연 (데이터만 쌓이면 검증 가능)
- 잎 분리(세그멘테이션)가 녹색·크기 기반 → 실제 잎인지 추가 검증 필요
- 모델이 캐노피 표면만 봄 (속잎은 못 뚫음) → 빽빽한 군락은 과소추정
